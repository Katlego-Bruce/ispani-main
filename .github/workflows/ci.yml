name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ispani_test
          POSTGRES_USER: ispani
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ispani:test_password@localhost:5432/ispani_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
      PORT: 4000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test database
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Run tests
        run: npm test

      - name: Smoke test server starts
        run: |
          node src/server.js &
          SERVER_PID=$!
          sleep 3
          HEALTH=$(curl -s http://localhost:4000/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"'
          kill $SERVER_PID

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ispani-api:${ { github.sha } } .

      - name: Verify image
        run: docker images ispani-api:${ { github.sha } }
