version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ispani-postgres
    environment:
      POSTGRES_DB: ispani
      POSTGRES_USER: ispani
      POSTGRES_PASSWORD: ispani_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ispani']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ispani-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
